<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顺德美食测评榜</title>
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;overflow-x:hidden}
a{color:#ff6b35;text-decoration:none}

/* ===== ANIMATED BACKGROUND ===== */
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:
    linear-gradient(rgba(255,107,53,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,107,53,0.03) 1px,transparent 1px);
  background-size:60px 60px;z-index:-1;pointer-events:none}
.glow-orb{position:fixed;border-radius:50%;filter:blur(80px);z-index:-1;pointer-events:none;animation:float 20s infinite ease-in-out}
.glow-orb:nth-child(1){width:500px;height:500px;background:rgba(255,23,68,0.08);top:-10%;left:-5%;animation-delay:0s}
.glow-orb:nth-child(2){width:400px;height:400px;background:rgba(255,145,0,0.06);bottom:-8%;right:-5%;animation-delay:-7s}
.glow-orb:nth-child(3){width:300px;height:300px;background:rgba(255,193,7,0.05);top:40%;left:50%;animation-delay:-14s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.05)}66%{transform:translate(-20px,20px) scale(0.95)}}

/* ===== HERO ===== */
.hero{position:relative;padding:80px 20px 60px;text-align:center;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,107,53,0.3),transparent)}
.hero-badge{display:inline-block;padding:6px 18px;border:1px solid rgba(255,107,53,0.3);border-radius:20px;font-size:13px;color:#ff6b35;letter-spacing:2px;margin-bottom:20px;background:rgba(255,107,53,0.05)}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;
  background:linear-gradient(135deg,#ff6b35,#ffc107,#ff6b35);background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradientShift 4s ease infinite;line-height:1.2}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hero-sub{color:#90a4ae;font-size:clamp(0.95rem,1.5vw,1.15rem);margin-top:12px;letter-spacing:1px}
.hero-meta{display:flex;justify-content:center;gap:30px;margin-top:18px;flex-wrap:wrap}
.hero-meta span{font-size:14px;color:#607d8b}
.hero-meta i{font-style:normal;color:#ff6b35;margin-right:4px}

/* ===== FILTER TABS ===== */
.filter-bar{display:flex;justify-content:center;gap:8px;padding:0 20px;margin:10px auto 30px;flex-wrap:wrap;max-width:700px}
.filter-btn{padding:8px 20px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;background:transparent;color:#90a4ae;font-size:14px;cursor:pointer;transition:all 0.3s;font-family:inherit}
.filter-btn:hover{border-color:rgba(255,107,53,0.4);color:#ff6b35}
.filter-btn.active{background:linear-gradient(135deg,#ff6b35,#ff9100);border-color:transparent;color:#fff;font-weight:600}

/* ===== SECTION TITLE ===== */
.section-title{text-align:center;padding:40px 20px 10px;font-size:clamp(1.4rem,2.5vw,1.8rem);font-weight:800;letter-spacing:2px}
.section-title .tier-label{display:inline-block;margin-right:8px}
.tier-S .section-title{color:#ff1744}
.tier-A .section-title{color:#ff9100}
.tier-B .section-title{color:#ffc107}
.tier-C .section-title{color:#90a4ae}
.tier-D .section-title{color:#607d8b}

/* ===== CARD GRID ===== */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;padding:10px 20px 40px;max-width:1200px;margin:0 auto}

/* ===== FOOD CARD ===== */
.food-card{background:linear-gradient(145deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border-radius:16px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(10px);transition:all 0.4s;cursor:pointer;position:relative}
.food-card:hover{transform:translateY(-6px);border-color:rgba(255,107,53,0.25);box-shadow:0 12px 40px rgba(255,107,53,0.1)}
.food-card .rank-badge{position:absolute;top:12px;left:12px;z-index:2;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;background:rgba(10,10,15,0.8);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.15)}
.food-card .img-wrap{width:100%;aspect-ratio:4/3;overflow:hidden;position:relative;background:#111}
.food-card .img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s}
.food-card:hover .img-wrap img{transform:scale(1.08)}
.food-card .card-body{padding:16px 18px 18px}
.food-card .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.food-card .food-name{font-size:17px;font-weight:700;color:#fff;line-height:1.3;flex:1}
.food-card .tier-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:13px;font-weight:700;white-space:nowrap;margin-left:8px;flex-shrink:0}
.tier-tag.tier-5{background:rgba(255,23,68,0.2);color:#ff1744;border:1px solid rgba(255,23,68,0.3)}
.tier-tag.tier-4{background:rgba(255,145,0,0.2);color:#ff9100;border:1px solid rgba(255,145,0,0.3)}
.tier-tag.tier-3{background:rgba(255,193,7,0.15);color:#ffc107;border:1px solid rgba(255,193,7,0.25)}
.tier-tag.tier-2{background:rgba(144,164,174,0.15);color:#90a4ae;border:1px solid rgba(144,164,174,0.25)}
.tier-tag.tier-1{background:rgba(96,125,139,0.15);color:#607d8b;border:1px solid rgba(96,125,139,0.25)}
.food-card .shop{font-size:13px;color:#607d8b;margin-bottom:10px}
.food-card .shop i{font-style:normal;color:#ff6b35;margin-right:4px}
.food-card .reviews{padding-top:8px;border-top:1px solid rgba(255,255,255,0.05)}
.food-card .review{display:flex;gap:6px;font-size:13px;line-height:1.6;margin-bottom:4px}
.food-card .review:last-child{margin-bottom:0}
.food-card .review .reviewer{color:#ff6b35;font-weight:600;white-space:nowrap}
.food-card .review .review-text{color:#b0bec5}
.food-card .consensus{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.food-card .consensus-tag{padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600}

/* ===== LIGHTBOX ===== */
.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);justify-content:center;align-items:center;flex-direction:column}
.lightbox.active{display:flex}
.lightbox .lb-close{position:absolute;top:20px;right:30px;font-size:36px;color:#fff;cursor:pointer;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,0.1);transition:0.3s;border:none;z-index:10;font-family:inherit}
.lightbox .lb-close:hover{background:rgba(255,23,68,0.3);transform:rotate(90deg)}
.lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:#fff;font-size:28px;cursor:pointer;transition:0.3s;display:flex;align-items:center;justify-content:center;z-index:10}
.lightbox .lb-nav:hover{background:rgba(255,107,53,0.3)}
.lightbox .lb-prev{left:20px}
.lightbox .lb-next{right:20px}
.lightbox .lb-content{max-width:90vw;max-height:80vh;text-align:center;padding:20px}
.lightbox .lb-content img{max-width:100%;max-height:65vh;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.lightbox .lb-info{margin-top:16px;text-align:center}
.lightbox .lb-info .lb-name{font-size:22px;font-weight:700;color:#fff}
.lightbox .lb-info .lb-shop{font-size:16px;color:#607d8b;margin-top:4px}
.lightbox .lb-info .lb-rating{font-size:18px;margin-top:8px}
.lightbox .lb-info .lb-reviews{margin-top:10px;font-size:14px;color:#b0bec5;max-width:500px;line-height:1.7}

/* ===== SHOP RANKING ===== */
.shop-section{padding:40px 20px 60px;max-width:900px;margin:0 auto}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:20px}
.shop-card{background:linear-gradient(145deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border-radius:16px;padding:24px 20px;text-align:center;border:1px solid rgba(255,255,255,0.06);transition:all 0.4s;position:relative}
.shop-card:hover{transform:translateY(-4px);border-color:rgba(255,107,53,0.2)}
.shop-card .shop-rank{font-size:36px;margin-bottom:6px}
.shop-card .shop-name{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
.shop-card .shop-score{display:flex;justify-content:center;gap:8px;margin:10px 0;flex-wrap:wrap}
.shop-card .shop-score span{padding:2px 8px;border-radius:8px;font-size:12px;font-weight:600}
.shop-card .shop-desc{font-size:13px;color:#90a4ae;line-height:1.5}
.shop-card .shop-medal{position:absolute;top:-8px;right:-8px;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px}
.shop-card:nth-child(1){border-color:rgba(255,193,7,0.2)}
.shop-card:nth-child(2){border-color:rgba(192,192,192,0.15)}
.shop-card:nth-child(3){border-color:rgba(205,127,50,0.12)}

/* ===== FOOTER ===== */
.footer{text-align:center;padding:30px 20px;color:#37474f;font-size:13px;border-top:1px solid rgba(255,255,255,0.04)}
.footer span{color:#607d8b}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .hero{padding:50px 16px 40px}
  .card-grid{grid-template-columns:1fr;gap:16px;padding:10px 12px 30px}
  .food-card .img-wrap{aspect-ratio:16/9}
  .hero-meta{gap:12px;flex-direction:column;align-items:center}
  .lightbox .lb-prev{left:10px;width:40px;height:40px;font-size:20px}
  .lightbox .lb-next{right:10px;width:40px;height:40px;font-size:20px}
  .shop-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:400px){
  .shop-grid{grid-template-columns:1fr}
}

/* ===== SCROLL ANIMATION ===== */
.food-card{opacity:0;transform:translateY(30px);transition:opacity 0.6s ease,transform 0.6s ease}
.food-card.visible{opacity:1;transform:translateY(0)}
</style>
</head>

<div class="lightbox" id="lightbox">

  { rank:"4", name:"肥光鱼生", counts:{夯:0,赞:0,可:0,中:3,拉:0}, desc:"一鱼四吃偏油，整体中规中矩" }
];

// ===== RENDER =====
function renderCards(data, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  data.forEach((item, idx) => {
    const tl = tierLabels[item.tier];
    const hasImg = item.img && item.img !== '';
    const card = document.createElement('div');
    card.className = 'food-card';
    card.dataset.shop = item.shop;
    card.innerHTML = `
      <div class="rank-badge">#${item.id}</div>
      <div class="img-wrap">
        <img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div style=\\\"display:flex;align-items:center;justify-content:center;height:100%;font-size:48px;color:#607d8b\\\">${item.emoji}</div>'">
      </div>
      <div class="card-body">
        <div class="card-header">
          <div class="food-name">${item.id}. ${item.name}</div>
          <span class="tier-tag ${tl.cls}">${tl.icon} ${tl.label.split('·')[0]}</span>
        </div>
        <div class="shop"><i>📍</i>${item.shop}</div>
        <div class="reviews">
          <div class="review"><span class="reviewer">Jason：</span><span class="review-text">${item.jason}</span></div>
          <div class="review"><span class="reviewer">总总：</span><span class="review-text">${item.zongzong}</span></div>
        </div>
      </div>
    `;
    card.addEventListener('click', () => openLightbox(item));
    container.appendChild(card);
  });
}

function renderShopRanking() {
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  shopData.forEach(s => {
    const card = document.createElement('div');
    card.className = 'shop-card';
    const countHtml = Object.entries(s.counts).filter(([k,v]) => v > 0).map(([k,v]) => {
      const iconMap = {夯:'🔥',赞:'⭐',可:'👍',中:'➖',拉:'💀'};
      return `<span style="background:rgba(255,255,255,0.06);color:#b0bec5">${iconMap[k]||''} ${v}</span>`;
    }).join('');
    card.innerHTML = `
      <div class="shop-rank" style="font-size:32px">${s.rank}</div>
      <div class="shop-name">${s.name}</div>
      <div class="shop-score">${countHtml}</div>
      <div class="shop-desc">${s.desc}</div>
    `;
    grid.appendChild(card);
  });
}

// ===== LIGHTBOX =====
let currentIndex = 0;
function openLightbox(item) {
  currentIndex = foodData.findIndex(d => d.id === item.id);
  updateLightbox();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function updateLightbox() {
  const item = foodData[currentIndex];
  const tl = tierLabels[item.tier];
  document.getElementById('lbImg').src = item.img;
  document.getElementById('lbName').textContent = `${item.emoji} ${item.name}`;
  document.getElementById('lbShop').textContent = `📍 ${item.shop}`;
  document.getElementById('lbRating').innerHTML = `<span class="tier-tag ${tl.cls}" style="display:inline-flex">${tl.icon} ${tl.label}</span>`;
  document.getElementById('lbReviews').innerHTML =
    `<div><strong style="color:#ff6b35">Jason：</strong>${item.jason}</div>` +
    `<div style="margin-top:6px"><strong style="color:#ff6b35">总总：</strong>${item.zongzong}</div>`;
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}
function prevImage() {
  currentIndex = (currentIndex - 1 + foodData.length) % foodData.length;
  updateLightbox();
}
function nextImage() {
  currentIndex = (currentIndex + 1) % foodData.length;
  updateLightbox();
}

// ===== FILTER =====
function filterCards(shop) {
  document.querySelectorAll('.food-card').forEach(c => {
    if (shop === 'all' || c.dataset.shop === shop) {
      c.style.display = '';
    } else {
      c.style.display = 'none';
    }
  });
}

// ===== SCROLL ANIMATION =====
function observeCards() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.food-card').forEach(c => observer.observe(c));
}

// ===== INIT =====
renderCards(foodData.filter(d => d.tier === 5), 'tier-5');
renderCards(foodData.filter(d => d.tier === 4), 'tier-4');
renderCards(foodData.filter(d => d.tier === 3), 'tier-3');
renderCards(foodData.filter(d => d.tier === 2), 'tier-2');
renderCards(foodData.filter(d => d.tier === 1), 'tier-1');
renderShopRanking();

// Event listeners
document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', prevImage);
document.getElementById('lbNext').addEventListener('click', nextImage);
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') prevImage();
  if (e.key === 'ArrowRight') nextImage();
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterCards(btn.dataset.filter);
  });
});

observeCards();
</script>
